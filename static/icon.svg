<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf6f0"/>
      <stop offset="100%" stop-color="#f0ebe0"/>
    </linearGradient>
    <linearGradient id="book" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4956a"/>
      <stop offset="100%" stop-color="#a67c52"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角方形 -->
  <rect x="40" y="40" width="944" height="944" rx="200" fill="url(#bg)" stroke="#d4b896" stroke-width="8"/>

  <!-- 书本/日记本 -->
  <g transform="translate(280, 200)">
    <!-- 书脊 -->
    <rect x="180" y="0" width="60" height="560" rx="8" fill="#8b6b4a"/>
    <!-- 左页 -->
    <rect x="30" y="20" width="180" height="520" rx="4" fill="#faf6f0" stroke="#d4b896" stroke-width="6"/>
    <!-- 右页 -->
    <rect x="230" y="20" width="180" height="520" rx="4" fill="#fffdf8" stroke="#d4b896" stroke-width="6"/>
    <!-- 左页横线 -->
    <line x1="60" y1="100" x2="190" y2="100" stroke="#e0d8cc" stroke-width="4"/>
    <line x1="60" y1="180" x2="190" y2="180" stroke="#e0d8cc" stroke-width="4"/>
    <line x1="60" y1="260" x2="190" y2="260" stroke="#e0d8cc" stroke-width="4"/>
    <!-- 左页文字 -->
    <text x="80" y="155" font-family="serif" font-size="36" fill="#8b7a6b">待办 ✓</text>
    <text x="80" y="235" font-family="serif" font-size="36" fill="#8b7a6b">习惯 ⭐</text>
    <text x="80" y="315" font-family="serif" font-size="24" fill="#c4b8a8">温暖记录</text>
    <!-- 右页横线 -->
    <line x1="260" y1="100" x2="390" y2="100" stroke="#e0d8cc" stroke-width="4"/>
    <line x1="260" y1="180" x2="390" y2="180" stroke="#e0d8cc" stroke-width="4"/>
    <line x1="260" y1="260" x2="390" y2="260" stroke="#e0d8cc" stroke-width="4"/>
    <!-- 右页文字 -->
    <text x="270" y="155" font-family="serif" font-size="36" fill="#8b7a6b">周一</text>
    <text x="270" y="235" font-family="serif" font-size="36" fill="#8b7a6b">周二</text>
    <!-- 右页标记 ✓ -->
    <circle cx="370" cy="140" r="20" fill="#7ba587"/>
    <path d="M362,140 L369,148 L380,132" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="370" cy="220" r="20" fill="#7ba587"/>
    <path d="M362,220 L369,228 L380,212" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 钢笔/羽毛笔 -->
  <g transform="translate(620, 240) rotate(25)">
    <!-- 笔身 -->
    <rect x="0" y="0" width="28" height="320" rx="14" fill="#c4956a"/>
    <!-- 笔尖 -->
    <polygon points="4,320 14,440 24,320" fill="#5c4b3c"/>
    <polygon points="8,440 14,460 20,440" fill="#a67c52"/>
    <!-- 笔夹 -->
    <rect x="2" y="20" width="24" height="10" rx="4" fill="#8b6b4a"/>
    <!-- 墨水点 -->
    <circle cx="300" cy="350" r="16" fill="#5c4b3c" opacity="0.6"/>
  </g>

  <!-- 装饰元素：小叶子 -->
  <g transform="translate(160, 680) rotate(-15)">
    <ellipse cx="0" cy="0" rx="50" ry="24" fill="#7ba587" opacity="0.5"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#7ba587" stroke-width="4" opacity="0.5"/>
  </g>
  <g transform="translate(800, 720) rotate(20)">
    <ellipse cx="0" cy="0" rx="40" ry="18" fill="#c4956a" opacity="0.4"/>
    <line x1="0" y1="0" x2="0" y2="-24" stroke="#c4956a" stroke-width="3" opacity="0.4"/>
  </g>

  <!-- 底部标题「周」 -->
  <text x="512" y="900" font-family="serif" font-size="72" fill="#c4956a" text-anchor="middle" font-weight="bold">周</text>
</svg>
